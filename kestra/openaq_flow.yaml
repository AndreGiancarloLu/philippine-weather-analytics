id: openaq_ingestion
namespace: zoomcamp
description: "Fetch OpenAQ data and load to BigQuery"

tasks:
  - id: run_dlt_pipeline
    type: io.kestra.plugin.scripts.python.Script
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    beforeCommands:
      - pip install "dlt[bigquery]==1.4.1" requests -q
    script: |
      import os
      import requests
      import dlt

      api_key = os.environ.get("OPENAQ_API_KEY", "")
      if not api_key:
          raise ValueError("OPENAQ_API_KEY is not set!")

      HEADERS = {"X-API-Key": api_key}
      BASE_URL = "https://api.openaq.org/v3"

      SEA_COUNTRIES = {
          "BN": "Brunei",
          "KH": "Cambodia",
          "ID": "Indonesia",
          "LA": "Laos",
          "MY": "Malaysia",
          "MM": "Myanmar",
          "PH": "Philippines",
          "SG": "Singapore",
          "TH": "Thailand",
          "VN": "Vietnam",
          "TL": "Timor-Leste"
      }

      def fetch_locations(iso_code):
          page = 1
          while True:
              resp = requests.get(
                  f"{BASE_URL}/locations",
                  headers=HEADERS,
                  params={"iso": iso_code, "limit": 1000, "page": page}
              )
              resp.raise_for_status()
              results = resp.json().get("results", [])
              if not results:
                  break
              yield from results
              if len(results) < 1000:
                  break
              page += 1

      def fetch_latest(location_id, location_name, country_iso, country_name):
          resp = requests.get(
              f"{BASE_URL}/locations/{location_id}/latest",
              headers=HEADERS,
              params={"limit": 100}
          )
          if resp.status_code != 200:
              return
          for m in resp.json().get("results", []):
              m["location_id"] = location_id
              m["location_name"] = location_name
              m["country_iso"] = country_iso
              m["country_name"] = country_name
              yield m

      @dlt.resource(write_disposition="replace", name="locations")
      def locations_resource(iso_code, country_name):
          print(f"  Fetching locations for {country_name}...")
          count = 0
          for loc in fetch_locations(iso_code):
              loc["country_iso"] = iso_code
              loc["country_name"] = country_name
              count += 1
              yield loc
          print(f"  {count} locations found for {country_name}")

      @dlt.resource(write_disposition="append", name="latest_measurements")
      def measurements_resource(iso_code, country_name):
          print(f"  Fetching measurements for {country_name}...")
          count = 0
          for loc in fetch_locations(iso_code):
              yield from fetch_latest(loc["id"], loc.get("name", ""), iso_code, country_name)
              count += 1
          print(f"  Done {country_name}: {count} locations processed")

      @dlt.source
      def openaq_source(iso_code, country_name):
          return [
              locations_resource(iso_code, country_name),
              measurements_resource(iso_code, country_name)
          ]

      pipeline = dlt.pipeline(
          pipeline_name="openaq_pipeline",
          destination="bigquery",
          dataset_name="raw_openaq_data"
      )

      for iso, name in SEA_COUNTRIES.items():
          print(f"\nIngesting {name} ({iso})...")
          try:
              load_info = pipeline.run(openaq_source(iso, name))
              print(f"Done: {load_info}")
          except Exception as e:
              print(f"Failed for {name} ({iso}): {e}, skipping...")

triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 0 * * *"