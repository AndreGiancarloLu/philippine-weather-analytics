version: 2

sources:
  - name: ph_weather
    database: philippine-weather-analytics
    schema: raw_ph_weather
    tables:
      - name: weather_daily
        tests:
          - dbt_utils.unique_combination_of_columns:
              arguments:
                combination_of_columns:
                  - province
                  - date
        columns:
          - name: province
            tests:
              - not_null
          - name: date
            tests:
              - not_null