version: 2

models:
  - name: stg_raw_weather_data
    description: "Cleaned daily weather data for 83 Philippine provinces from 2015-2025. Includes derived columns for region, season, year and month."
    columns:
      - name: province
        description: "Philippine province name"
        tests:
          - not_null
      - name: date
        description: "Date of weather observation"
        tests:
          - not_null
      - name: region
        description: "Luzon, Visayas, or Mindanao"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Luzon', 'Visayas', 'Mindanao']
      - name: season
        description: "Wet season (Jun-Nov) or Dry season (Dec-May)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Wet', 'Dry']